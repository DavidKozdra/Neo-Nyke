name = "neonyke"
compatibility_date = "2026-05-22"
compatibility_flags = ["nodejs_compat"]

# Serve static game files from dist/ (populated by build command)
assets = { directory = "dist" }

# Worker script handles API routes under /api/*
main = "server/server.js"

[[kv_namespaces]]
binding = "STORE"
id = "021d5bfc72ad4344a7ba58f1155c5dee"
preview_id = "021d5bfc72ad4344a7ba58f1155c5dee"

[[durable_objects.bindings]]
name = "MULTIPLAYER_ROOMS"
class_name = "MultiplayerRoom"

[[ratelimits]]
name = "MULTIPLAYER_CREATE_LIMITER"
namespace_id = "82024001"

  [ratelimits.simple]
  limit = 10
  period = 60

[[ratelimits]]
name = "MULTIPLAYER_SOCKET_LIMITER"
namespace_id = "82024002"

  [ratelimits.simple]
  limit = 30
  period = 60

[[migrations]]
tag = "multiplayer-rooms-v1"
new_sqlite_classes = ["MultiplayerRoom"]

[triggers]
crons = ["0 0 * * 1"]
