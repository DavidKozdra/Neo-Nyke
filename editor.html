<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NeoNyke Sprite Editor</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #05070f;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #05070f;
    }
  </style>
</head>
<body>
  <!-- The editor uses the real game runtime so atlas rebuilds and live previews
       behave exactly as they do in-game. The query flag opens the editor as
       soon as the runtime is ready and strips away the underlying menu. -->
  <iframe src="/index.html?sprite-editor=standalone" title="NeoNyke Sprite Editor"></iframe>
</body>
</html>
